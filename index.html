<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPlay | A Arena dos Deuses</title>
    <style>
        /* ========== RESET E ESTILOS GLOBAIS - RESPONSIVO ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c12;
            --bg-secondary: #0f111a;
            --bg-card: #181c28;
            --color-primary: #ff3366;
            --color-secondary: #ffaa44;
            --text-light: #eef5ff;
            --text-medium: #bdc3e0;
            --text-dark: #9aa2bf;
            --border-color: #2a2f3f;
        }

        html {
            font-size: 16px;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Orbitron', 'Poppins', Arial, sans-serif;
            line-height: 1.4;
            color: var(--text-light);
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ========== HEADER ========== */
        .main-header {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2f 100%);
            border-bottom: 3px solid var(--color-primary);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(24px, 5vw, 32px);
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(255,51,102,0.3);
        }

        .logo-area p {
            font-size: clamp(10px, 2vw, 12px);
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: clamp(16px, 3vw, 32px);
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: clamp(14px, 2.5vw, 18px);
            transition: 0.2s;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover {
            color: #ff6670;
            border-bottom-color: var(--color-primary);
        }

        /* ========== HERO SECTION ========== */
        .hero {
            background: radial-gradient(circle at 20% 30%, #19212b, #03050b);
            padding: clamp(40px, 8vw, 80px) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap-reverse;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-text {
            flex: 1 1 300px;
        }

        .hero-text .badge {
            background: var(--color-primary);
            display: inline-block;
            padding: 6px 18px;
            font-size: clamp(12px, 2vw, 14px);
            font-weight: bold;
            border-radius: 30px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(255,51,102,0.4);
        }

        .hero-text h2 {
            font-size: clamp(32px, 7vw, 54px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-text h2 span {
            color: var(--color-secondary);
            text-shadow: 0 0 6px var(--color-secondary);
        }

        .hero-text p {
            font-size: clamp(14px, 3vw, 18px);
            color: var(--text-medium);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary {
            padding: clamp(12px, 3vw, 14px) clamp(24px, 5vw, 32px);
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            border: none;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            box-shadow: 0 6px 0 #a01e42;
        }

        .btn-primary:hover {
            background: #ff5577;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--color-secondary);
            color: #ffdd99;
        }

        .btn-secondary:hover {
            background: rgba(255,170,68,0.1);
            border-color: #ffcc66;
            color: #fff0c0;
        }

        .hero-image {
            flex: 1 1 300px;
            text-align: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 480px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        /* ========== JOGOS EM DESTAQUE ========== */
        .featured {
            padding: clamp(50px, 8vw, 70px) 0;
            background: var(--bg-secondary);
        }

        .section-title {
            font-size: clamp(24px, 5vw, 38px);
            text-align: center;
            margin-bottom: 50px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section-title span {
            color: var(--color-secondary);
            border-bottom: 4px solid var(--color-primary);
            padding-bottom: 6px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 28px;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.2s linear;
            border: 1px solid var(--border-color);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: #ff6680;
            box-shadow: 0 12px 26px rgba(0,0,0,0.5);
        }

        .game-img {
            height: 170px;
            background-size: cover;
            background-position: center;
        }

        .game-info {
            padding: 20px 18px 24px;
        }

        .game-info h3 {
            font-size: clamp(18px, 3vw, 24px);
            margin-bottom: 8px;
        }

        .game-info p {
            color: var(--text-dark);
            font-size: clamp(12px, 2.5vw, 14px);
            margin-bottom: 20px;
        }

        .game-tag {
            display: inline-block;
            background: rgba(255,51,102,0.12);
            color: #ff7799;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
        }

        /* ========== BANNER PROMO ========== */
        .promo-banner {
            background: linear-gradient(90deg, #1a1c2c, #221f32);
            margin: 40px auto;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-left: 8px solid var(--color-secondary);
            gap: 20px;
            flex-wrap: wrap;
        }

        .promo-text h4 {
            font-size: clamp(18px, 4vw, 28px);
            font-weight: 700;
        }

        .promo-text p {
            font-size: clamp(12px, 2.5vw, 16px);
            color: var(--text-medium);
        }

        .promo-btn {
            background: var(--color-secondary);
            color: #1e1b2c;
            border: none;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: clamp(14px, 2.5vw, 18px);
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .promo-btn:hover {
            background: #ffcc66;
            transform: scale(0.98);
        }

        /* ========== RANKING ========== */
        .rank-section {
            padding: 30px 0 70px;
            background: #0c0e16;
        }

        .rank-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .rank-header h3 {
            font-size: clamp(20px, 4vw, 32px);
        }

        .rank-header a {
            color: #ffaa66;
            text-decoration: none;
            font-weight: 500;
            font-size: clamp(12px, 2.5vw, 16px);
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: #10131e;
            border-radius: 24px;
            overflow: hidden;
        }

        .rank-table th, .rank-table td {
            padding: clamp(12px, 3vw, 18px) clamp(10px, 2vw, 20px);
            text-align: left;
            border-bottom: 1px solid #22273a;
            font-size: clamp(12px, 2.5vw, 16px);
        }

        .rank-table th {
            background: #1e2337;
            color: #ffcc99;
            font-weight: 700;
        }

        .rank-number {
            font-weight: bold;
            font-size: clamp(16px, 3vw, 20px);
            color: #ffaa55;
        }

        .player-score {
            font-family: monospace;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: bold;
            color: #66ffcc;
        }

        /* ========== NEWSLETTER ========== */
        .newsletter {
            background: #131725;
            margin: 20px auto 50px;
            border-radius: 40px;
            padding: clamp(30px, 6vw, 48px) clamp(20px, 4vw, 60px);
            text-align: center;
            box-shadow: inset 0 0 0 1px #2a2f42, 0 10px 20px rgba(0,0,0,0.3);
        }

        .newsletter h3 {
            font-size: clamp(20px, 4vw, 32px);
            margin-bottom: 12px;
        }

        .newsletter p {
            color: var(--text-dark);
            margin-bottom: 28px;
            font-size: clamp(12px, 2.5vw, 16px);
        }

        .form-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-group input {
            background: #0b0e18;
            border: 1px solid #373e5a;
            padding: 14px 20px;
            width: 100%;
            max-width: 320px;
            border-radius: 60px;
            font-size: 16px;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: #ff6680;
        }

        .form-group button {
            background: var(--color-primary);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .form-group button:hover {
            background: #ff5b85;
        }

        /* ========== FOOTER ========== */
        .main-footer {
            background: #07090f;
            padding: 40px 0 30px;
            border-top: 1px solid #252a3c;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        .footer-col h4 {
            font-size: clamp(16px, 3vw, 20px);
            margin-bottom: 20px;
            color: #ffaa66;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col li {
            margin-bottom: 12px;
        }

        .footer-col a {
            color: #a0a8ca;
            text-decoration: none;
            transition: 0.2s;
            font-size: clamp(12px, 2.5vw, 14px);
        }

        .footer-col a:hover {
            color: #ff6680;
        }

        .copyright {
            text-align: center;
            padding: 24px 0 20px;
            background: #030409;
            color: #6c7295;
            font-size: clamp(11px, 2vw, 13px);
            border-top: 1px solid #1a1e2
